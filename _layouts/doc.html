---
layout: base
---

<div class="dev-layout">
  {% include sidebar.html %}

  <main class="dev-main">
    <article class="dev-document">
      <header class="dev-hero">
        {% if page.eyebrow %}
        <div class="dev-eyebrow">{{ page.eyebrow }}</div>
        {% else %}
        <div class="dev-eyebrow">Documentation</div>
        {% endif %}

        <h1 class="dev-title">{{ page.title }}</h1>

        {% if page.description %}
        <p class="dev-subtitle">{{ page.description }}</p>
        {% endif %}
      </header>

      {% include toc.html %}

      <div class="doc-card">
        <div class="markdown">
          {{ content }}
        </div>
      </div>
    </article>

    <footer class="dev-footer">
      <a href="{{ '/' | relative_url }}">mochiOS Developer</a>
    </footer>
  </main>
</div>
