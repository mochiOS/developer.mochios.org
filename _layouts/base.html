<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/developer.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/doc-toc.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
  <button class="doc-index-button" type="button" data-doc-index-button aria-label="Open navigation" aria-expanded="false">
    <span class="doc-index-button-bars" aria-hidden="true"><span></span><span></span><span></span></span>
  </button>
  <div class="doc-index-overlay" data-doc-index-overlay></div>
  {% include header.html %}
  {{ content }}
  <script src="{{ '/assets/js/docs.js' | relative_url }}" defer></script>
</body>
</html>
