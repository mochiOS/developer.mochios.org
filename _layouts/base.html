<!doctype html>
<html lang="{{ site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}
    {{ page.title }} | {{ site.title }}
    {% else %}
    {{ site.title }}
    {% endif %}
  </title>

  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/developer.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/doc-toc.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
{% include header.html %}

<button class="doc-index-button" type="button" aria-label="Open navigation" data-doc-index-button>
    <span class="doc-index-button-bars">
      <span></span>
      <span></span>
      <span></span>
    </span>
</button>

<div class="doc-index-overlay" data-doc-index-overlay></div>

{{ content }}

<script src="{{ '/assets/js/docs.js' | relative_url }}"></script>
</body>
</html>
